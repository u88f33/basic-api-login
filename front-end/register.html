<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/bootstrap.min.css" />
    <link rel="stylesheet" href="./style/custom.css" />
    <link rel="stylesheet" href="./style/register.css" />
    <title>Table</title>
</head>
<body class="login-body">

<div class="login-bg-orb"></div>
<div class="login-bg-orb login-bg-orb--secondary"></div>

<div class="container login-container">
    <div class="row login-row">
        <div class="col-12 pt-5 login-col">

            <div class="w-50 reg-card ms-auto me-auto">

                <div class="login-card__header">
                    <div class="login-card__icon reg-card__icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" fill="currentColor"/>
                            <path d="M19 19C19 17.4087 18.3679 15.8826 17.2426 14.7574C16.1174 13.6321 14.5913 13 13 13H11C9.4087 13 7.88258 13.6321 6.75736 14.7574C5.63214 15.8826 5 17.4087 5 19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="19" cy="19" r="4" fill="currentColor"/>
                            <path d="M19 17.5V20.5M17.5 19H20.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h1 class="mb-4 login-heading">User Registration</h1>
                    <p class="login-subheading">Create your account — it only takes a moment</p>
                </div>

                <form id="registerForm" class="login-form">

                    <div class="form-row login-form-group">
                        <label class="fs-5 mb-1 login-label">Username: </label>
                        <div class="reg-input-wrap">
                            <svg class="reg-input-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" fill="currentColor"/>
                                <path d="M12 14C7.03 14 3 17.13 3 21V22H21V21C21 17.13 16.97 14 12 14Z" fill="currentColor"/>
                            </svg>
                            <input type="text" class="form-control login-input reg-input" id="registerName" placeholder="Choose a username" />
                        </div>
                    </div>

                    <div class="form-row login-form-group">
                        <label class="fs-5 mb-1 login-label">Email: </label>
                        <div class="reg-input-wrap">
                            <svg class="reg-input-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="2" y="4" width="20" height="16" rx="3" stroke="currentColor" stroke-width="2"/>
                                <path d="M2 8L10.586 13.586C11.367 14.105 12.633 14.105 13.414 13.586L22 8" stroke="currentColor" stroke-width="2"/>
                            </svg>
                            <input type="email" class="form-control login-input reg-input" id="registerEmail" placeholder="Enter your email address" />
                        </div>
                    </div>

                    <div class="form-row login-form-group">
                        <label class="fs-5 mb-1 login-label">Password: </label>
                        <div class="reg-input-wrap">
                            <svg class="reg-input-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="2"/>
                                <path d="M8 11V7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7V11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                                <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
                            </svg>
                            <input type="password" class="form-control login-input reg-input" id="registerPassword" placeholder="Create a strong password" />
                            <button type="button" class="reg-pw-toggle" aria-label="Toggle password visibility" onclick="this.previousElementSibling.type = this.previousElementSibling.type==='password'?'text':'password'; this.classList.toggle('active')">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2"/>
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </button>
                        </div>
                        <div class="reg-strength-bar" id="strengthBar">
                            <span></span><span></span><span></span><span></span>
                        </div>
                        <p class="reg-strength-label" id="strengthLabel"></p>
                    </div>

                    <div class="d-flex justify-content-right login-actions">
                        <button type="Submit" class="btn login-btn mt-4 ms-auto reg-submit-btn">
                            Create Account &rarr;
                        </button>
                    </div>
                </form>

                <p class="login-register-text">
                    Already have an account? <a href="index.html" class="login-register-link">Sign in</a>
                </p>

            </div>

        </div>
    </div>
</div>

<script src="./script/jquery.js"></script>
<script src="./script/bootstrap.min.js"></script>
<script src="./script/bootstrap.bundle.min.js"></script>
<script src="./script/authenticate.js"></script>
<script src="./script/script.js"></script>

<!-- Password strength meter (no external deps) -->
<script>
    const pwInput = document.getElementById('registerPassword');
    const bar     = document.getElementById('strengthBar');
    const label   = document.getElementById('strengthLabel');
    const spans   = bar.querySelectorAll('span');

    const levels = [
        { min: 0,  label: '',          cls: '' },
        { min: 1,  label: 'Weak',      cls: 'strength-weak' },
        { min: 2,  label: 'Fair',      cls: 'strength-fair' },
        { min: 3,  label: 'Good',      cls: 'strength-good' },
        { min: 4,  label: 'Strong',    cls: 'strength-strong' },
    ];

    function score(v) {
        let s = 0;
        if (v.length >= 8)               s++;
        if (/[A-Z]/.test(v))             s++;
        if (/[0-9]/.test(v))             s++;
        if (/[^A-Za-z0-9]/.test(v))      s++;
        return v.length === 0 ? 0 : Math.max(s, 1);
    }

    pwInput.addEventListener('input', () => {
        const s = score(pwInput.value);
        spans.forEach((sp, i) => {
            sp.className = i < s ? levels[s].cls : '';
        });
        label.textContent = levels[s].label;
        label.className   = 'reg-strength-label ' + levels[s].cls;
        bar.style.opacity = pwInput.value ? '1' : '0';
    });
</script>
</body>
</html>
